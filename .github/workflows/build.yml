name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: autogen
        run: ./autogen.sh

      - name: configure
        run: ./configure

      - name: make
        run: make -j$(nproc)

      - name: make check
        run: make check
